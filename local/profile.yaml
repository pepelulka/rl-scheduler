master: "localhost:2000"

s3:
  endpoint: "http://localhost:9000"
  login: "local"
  password: "12345678"
  bucket: "data"

resources_dir: "../local/resources"

workers:
  - pinned: "worker1:2001"    # адрес, который мастер (внутри Docker) использует для отправки задачи
    metrics: "localhost:2001"  # адрес, по которому profile-инструмент (на хосте) снимает метрики
  - pinned: "worker2:2002"
    metrics: "localhost:2002"
  - pinned: "worker3:2003"
    metrics: "localhost:2003"
  - pinned: "worker4:2004"
    metrics: "localhost:2004"
  - pinned: "worker5:2005"
    metrics: "localhost:2005"
  - pinned: "worker6:2006"
    metrics: "localhost:2006"

tasks:
  - type: monte_carlo
    sizes: [2000000, 4000000, 6000000]   # O(N)
    repeats: 3

  - type: mat_mul
    sizes: [100, 150, 200]               # N×N матрица: (O(N³))
    repeats: 3

  - type: prime_sieve
    sizes: [5000000, 10000000, 20000000] # O(N log log N)
    repeats: 3

timeout: "30m"
output_csv: "profile_results_pairs.csv"
parallel_pair: true
