port: 2000
workers:
  - host: "worker1:2001"
  - host: "worker2:2002"
  - host: "worker3:2003"
  - host: "worker4:2004"
  - host: "worker5:2005"
  - host: "worker6:2006"

# Выбор планировщика: "least_loaded" (по умолчанию) или "rl"
scheduler: least_loaded

# URL inference-сервиса (нужен только при scheduler: rl)
inference_url: http://host.docker.internal:8000
