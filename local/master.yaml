port: 2000
workers:
  - host: "worker1:2001"
  - host: "worker2:2002"
  - host: "worker3:2003"
  - host: "worker4:2004"
  - host: "worker5:2005"
  - host: "worker6:2006"

# "least_loaded" (default), "round_robin", "resource_aware", "rl"   
scheduler: resource_aware

max_tasks_per_worker: 2

# URL inference-сервиса (нужен только при scheduler: rl)
inference_url: http://host.docker.internal:8000
