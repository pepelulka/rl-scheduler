syntax = "proto3";

package master.v1;

option go_package = "github.com/pepelulka/rl-scheduler/proto/gen/go/master;masterpb";

import "google/protobuf/timestamp.proto";

service MasterService {
    rpc ReportTaskResult(ReportTaskResultRequest) returns (ReportTaskResultResponse);
    rpc SubmitTask(SubmitTaskRequest) returns (SubmitTaskResponse);
}

enum TaskResultType {
    TASK_RESULT_TYPE_UNSPECIFIED = 0;
    TASK_RESULT_TYPE_SUCCESS = 1;
    TASK_RESULT_TYPE_FAIL = 2;
}

message ReportTaskResultRequest {
    string task_id = 1;
    TaskResultType type = 2;
    string error = 3;
}

message ReportTaskResultResponse {}

// SubmitTask — принять задачу в очередь мастера.
// Метаинформация (meta, cluster_meta) намеренно передаётся как map<string,string>:
// её структура произвольна и будет меняться по мере развития планировщика.
message SubmitTaskRequest {
    string type        = 1; // тип задачи, например "python"
    string input_file  = 2;
    string output_file = 3;
    string script      = 4;
    map<string, string> meta = 5; // произвольная метаинформация по задаче
}

message SubmitTaskResponse {
    string task_id = 1;
}
